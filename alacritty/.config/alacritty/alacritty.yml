live_config_reload: true

window:
  opacity: 0.85
  padding:
    x: 18
    y: 5
  dynamic_padding: false
  decorations: buttonless

font:
  normal:
    family: "MonoLisa Nerd Font"
    style: Regular
  size: 18.0

hints:
  enabled:
    - regex: "(mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"
      command: xdg-open
      post_processing: true
      mouse:
        enabled: true
        mods: Control
